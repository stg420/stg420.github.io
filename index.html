<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh Entertainment Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }
        .game-card {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            width: 300px;
            height: 400px;
            margin: 15px;
            border: 1px solid #334155;
            transition: transform 0.2s;
            vertical-align: top;
            text-align: center;
        }
        .game-card:hover {
            transform: scale(1.05);
            border-color: #38bdf8;
        }
        .game-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #334155; /* Placeholder color if image fails */
        }
        h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #f8fafc;
        }
        .play-btn {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
        .play-btn:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

    <h1>Josh Entertainment Hub</h1>

    <!-- Kindergarten 3 Card -->
    <div class="game-card">
        <img src="https://static.wikia.nocookie.net/kindergarten/images/3/31/Capsule_616x353.jpg" alt="Kindergarten 3">
        <h2>Kindergarten 3</h2>
        <a href="https://stg420.github.io/kindergarten3/" class="play-btn">Play Kindergarten 3</a>
    </div>

    <!-- Bendy Card -->
    <div class="game-card">
        <img src="https://static.wikia.nocookie.net/bendy-and-the-ink-machine/images/3/3b/BATIM_Steam_thumbnail_2024.jpg" alt="Bendy and the Ink Machine">
        <h2>Bendy And The Ink Machine</h2>
        <a href="https://stg420.github.io/batim/" class="play-btn">Play Bendy</a>
    </div>

</body>
</html>

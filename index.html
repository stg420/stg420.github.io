<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh Entertainment Hub</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 20px; color: #00d4ff; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background-color: #1e1e1e; border: 1px solid #333; padding: 15px; text-align: center; border-radius: 8px; transition: transform 0.2s; }
        .game-card:hover { transform: scale(1.05); border-color: #00d4ff; }
        .game-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .play-btn { display: block; background-color: #00d4ff; color: #121212; padding: 10px; text-decoration: none; font-weight: bold; border-radius: 4px; margin-top: 10px; }
        .play-btn:hover { background-color: #008fb3; }
    </style>
</head>
<body>

<header>
    <h1>Josh Entertainment Hub</h1>
</header>

<div class="game-grid">
    <div class="game-card">
        <h3>Kindergarten 3</h3>
        <img src="path/to/k3-thumb.jpg" alt="Kindergarten 3">
        <a href="https://stg420.github.io/kindergarten3/" class="play-btn">Play</a>
    </div>
    <div class="game-card">
        <h3>Bendy</h3>
        <img src="path/to/bendy-thumb.jpg" alt="Bendy">
        <a href="https://stg420.github.io/bendy/" class="play-btn">Play</a>
    </div>
    <div class="game-card">
        <h3>Baldi's Basics Plus</h3>
        <img src="path/to/baldi-thumb.jpg" alt="Baldi's Basics Plus">
        <a href="https://stg420.github.io/baldi/" class="play-btn">Play</a>
    </div>
    <div class="game-card">
        <h3>TABS</h3>
        <img src="https://cdna.artstation.com/p/assets/images/images/016/974/668/large/pontus-ullbors-tabs-steamstore-1-artstation.jpg" alt="Totally Accurate Battle Simulator">
        <a href="https://stg420.github.io/tabs/" class="play-btn">Play</a>
    </div>
    <div class="game-card">
        <h3>Grand Theft Auto 3</h3>
        <img src="https://www.igrandtheftauto.com/content/images/3253-gtaiii-10th-anniversary-european-cover-art.jpg" alt="Grand Theft Auto 3">
        <a href="https://stg420.github.io/gta3/" class="play-btn">Play</a>
    </div>
    <div class="game-card">
        <h3>Schoolboy Runaway</h3>
        <img src="https://images.igdb.com/igdb/image/upload/t_cover_big/co98mu.webp" alt="Schoolboy Runaway">
        <a href="https://stg420.github.io/schoolboy/" class="play-btn">Play</a>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh Entertainment Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }
        .game-card {
            background-color: #1e293b;
            padding: 16px; /* Reduced by 20% */
            border-radius: 10px; /* Reduced by 20% */
            display: inline-block;
            width: 240px; /* Reduced from 300px by 20% */
            height: 320px; /* Reduced from 400px by 20% */
            margin: 12px; /* Reduced by 20% */
            border: 1px solid #334155;
            transition: transform 0.2s;
            vertical-align: top;
            text-align: center;
        }
        .game-card:hover {
            transform: scale(1.05);
            border-color: #38bdf8;
        }
        .game-card img {
            width: 100%;
            height: 160px; /* Reduced from 200px by 20% */
            object-fit: cover;
            border-radius: 6px; /* Reduced by 20% */
            margin-bottom: 12px; /* Reduced by 20% */
            background-color: #334155;
        }
        h2 {
            font-size: 1.1rem; /* Reduced by 20% */
            margin-bottom: 12px; /* Reduced by 20% */
            color: #f8fafc;
        }
        .play-btn {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 8px 16px; /* Reduced by 20% */
            border-radius: 5px; /* Reduced by 20% */
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 8px; /* Reduced by 20% */
        }
        .play-btn:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

    <h1>Josh Entertainment Hub</h1>

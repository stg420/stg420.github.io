<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stg420 Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }
        .game-card {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            width: 250px;
            margin: 15px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }
        .game-card:hover {
            transform: scale(1.05);
            border-color: #38bdf8;
        }
        h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .play-btn {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        .play-btn:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Hub</h1>

    <!-- Kindergarten 3 Card -->
    <div class="game-card">
        <h2>Kindergarten 3</h2>
        <a href="https://stg420.github.io/kindergarten3/" class="play-btn">Play Kindergarten 3</a>
    </div>

    <!-- Game 2 Card -->
    <div class="game-card">
        <h2>Bendy And The Ink Machine</h2>
        <a href="https://stg420.github.io/batim/" class="play-btn">Bendy And The Ink Machine</a>
    </div>



</body>
</html>

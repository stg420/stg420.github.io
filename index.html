<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Henny Vault</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 50px 20px; margin: 0; }
        h1 { color: #38bdf8; font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.5rem; color: #94a3b8; margin-bottom: 20px; }
        
        #searchContainer { margin-bottom: 40px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .control-btn { padding: 12px 20px; border-radius: 25px; border: none; background-color: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: transform 0.2s; width: 140px; text-align: center; }
        .control-btn:hover { transform: scale(1.05); }

        #gameSearch { padding: 12px 20px; border-radius: 25px; border: 1px solid #334155; background-color: #1e293b; color: white; width: 300px; font-size: 1rem; outline: none; }
        
        #mainContainer { transition: opacity 0.4s ease; min-height: 400px; }
        .game-grid { display: flex; flex-wrap: wrap; justify-content: center; max-width: 1200px; margin: 0 auto; transition: opacity 0.4s ease; }
        
        .game-card { background-color: #1e293b; padding: 16px; border-radius: 10px; display: inline-block; width: 240px; margin: 12px; border: 1px solid #334155; transition: transform 0.3s; position: relative; }
        .game-card:hover { transform: scale(1.05); border-color: #38bdf8; }
        .game-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 12px; }
        
        .play-btn { background-color: #38bdf8; color: #0f172a; padding: 8px 16px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 8px; }
        .star-icon { position: absolute; bottom: 12px; right: 12px; cursor: pointer; color: #475569; font-size: 32px; }
        .star-icon.active { color: #fbbf24; }

        #changelog { max-width: 800px; margin: 0 auto; text-align: left; background: #1e293b; padding: 30px; border-radius: 10px; display: none; height: 400px; overflow-y: auto; }
        #noResults, #emptyMsg { display: none; font-size: 1.5rem; color: #64748b; margin-top: 50px; }
    </style>
</head>
<body>

    <h1 id="pageTitle">The Henny Vault</h1>
    <p class="subtitle" id="subInfo">
        <span id="navLinks">
            <span id="viewBtn" style="color: #38bdf8; cursor: pointer; text-decoration: underline;" onclick="switchPage('favorites')">View Favorites</span> | 
            <span style="color: #38bdf8; cursor: pointer; text-decoration: underline;" onclick="switchPage('changelog')">Changelog</span>
        </span>
    </p>

    <div id="searchContainer">
        <button id="surpriseBtn" class="control-btn" onclick="handleSurprise()">Surprise Me</button>
        <input type="text" id="gameSearch" placeholder="Search for a game..." onkeyup="filterGames()">
    </div>

    <div id="mainContainer">
        <div id="gameGrid" class="game-grid">
            <!-- Cards remain the same as your provided code -->
            <div class="game-card" data-id="kg1"><img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/589590/header.jpg" alt="Kindergarten 1"><h2>Kindergarten 1</h2><a href="https://stg420.github.io/kindergarten1/" class="play-btn">Play</a><span class="star-icon" onclick="toggleFavorite(this, 'kg1')">★</span></div>
            <div class="game-card" data-id="kg2"><img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1067850/header.jpg" alt="Kindergarten 2"><h2>Kindergarten 2</h2><a href="https://stg420.github.io/kindergarten2/" class="play-btn">Play</a><span class="star-icon" onclick="toggleFavorite(this, 'kg2')">★</span></div>
            <div class="game-card" data-id="pvz"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/9/9c/PlantsvsZombiesCoverArt.jpg/250px-PlantsvsZombiesCoverArt.jpg" alt="Plants vs. Zombies"><h2>Plants vs. Zombies</h2><a href="https://stg420.github.io/pvz" class="play-btn">Play</a><span class="star-icon" onclick="toggleFavorite(this, 'pvz')">★</span></div>
        </div>
        <div id="changelog">
            <h2>Changelog</h2>
            <ul><li>Added animation system.</li><li>Fixed navigation logic.</li></ul>
        </div>
        <div id="noResults">No games match search.</div>
        <div id="emptyMsg">No favorites selected. Click the star to favorite a game!</div>
    </div>

    <script>
        let isSurpriseMode = false;
        const grid = document.getElementById('gameGrid');
        const changelog = document.getElementById('changelog');
        const emptyMsg = document.getElementById('emptyMsg');

        function updateStarIcons() {
            let favs = JSON.parse(localStorage.getItem('favs') || '[]');
            document.querySelectorAll('.star-icon').forEach(icon => {
                let id = icon.parentElement.getAttribute('data-id');
                icon.className = favs.includes(id) ? 'star-icon active' : 'star-icon';
            });
        }

        function handleSurprise() {
            if (isSurpriseMode) { window.location.reload(); } 
            else {
                let cards = Array.from(document.querySelectorAll('.game-card'));
                let randomCard = cards[Math.floor(Math.random() * cards.length)];
                grid.innerHTML = "";
                grid.appendChild(randomCard);
                document.getElementById('surpriseBtn').innerText = "Return Home";
                isSurpriseMode = true;
            }
        }

        function switchPage(page) {
            document.getElementById('mainContainer').style.opacity = 0;
            setTimeout(() => {
                grid.style.display = 'none'; changelog.style.display = 'none'; emptyMsg.style.display = 'none';
                if(page === 'favorites') {
                    let favs = JSON.parse(localStorage.getItem('favs') || '[]');
                    if(favs.length === 0) { emptyMsg.style.display = 'block'; }
                    else {
                        grid.style.display = 'flex';
                        document.querySelectorAll('.game-card').forEach(c => c.style.display = favs.includes(c.dataset.id) ? 'inline-block' : 'none');
                    }
                } else { changelog.style.display = 'block'; }
                document.getElementById('navLinks').innerHTML = `<span style="color: #38bdf8; cursor: pointer; text-decoration: underline;" onclick="window.location.reload()">Return Home</span>`;
                document.getElementById('mainContainer').style.opacity = 1;
            }, 400);
        }

        function toggleFavorite(el, id) {
            let favs = JSON.parse(localStorage.getItem('favs') || '[]');
            if (favs.includes(id)) { favs = favs.filter(i => i !== id); } else { favs.push(id); }
            localStorage.setItem('favs', JSON.stringify(favs));
            updateStarIcons();
        }

        updateStarIcons();
    </script>
</body>
</html>

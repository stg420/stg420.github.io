<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh Entertainment Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 50px 20px; margin: 0; }
        
        /* View Counter - Plain text style */
        .view-counter { position: absolute; top: 20px; left: 20px; color: #94a3b8; font-size: 1.5rem; display: flex; align-items: center; gap: 12px; }
        #hit-count { color: #f8fafc; font-weight: bold; }

        h1 { color: #38bdf8; font-size: 3.5rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.8rem; color: #94a3b8; margin-bottom: 40px; }
        
        #mainContainer { transition: opacity 0.3s ease; }
        .game-grid { display: flex; flex-wrap: wrap; justify-content: center; max-width: 1200px; margin: 0 auto; }
        
        .game-card { background-color: #1e293b; padding: 16px; border-radius: 10px; display: inline-block; width: 240px; margin: 12px; border: 1px solid #334155; transition: transform 0.2s; vertical-align: top; text-align: center; position: relative; }
        .game-card:hover { transform: scale(1.05); border-color: #38bdf8; }
        .game-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 12px; background-color: #334155; }
        h2 { font-size: 1.1rem; margin-bottom: 4px; }
        
        .game-meta { font-size: 0.75rem; color: #94a3b8; display: block; margin-top: 2px; }
        .recent-tag { font-size: 0.75rem; color: #38bdf8; font-weight: bold; display: block; margin-top: 4px; margin-bottom: 8px; }
        
        .play-btn { background-color: #38bdf8; color: #0f172a; padding: 8px 16px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 8px; transition: transform 0.2s; }
        .play-btn:hover { background-color: #7dd3fc; transform: scale(1.05); }
        
        .star-icon { position: absolute; bottom: 12px; right: 12px; cursor: pointer; color: #475569; font-size: 32px; transition: all 0.2s; }
        .star-icon:hover { color: #94a3b8; }
        .star-icon.active { color: #fbbf24; }

        #changelog { max-width: 900px; margin: 0 auto; text-align: left; background: #1e293b; padding: 30px; border-radius: 10px; display: none; height: 500px; overflow-y: auto; }
        #changelog ul { list-style: none; padding: 0; }
        #changelog li { margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; font-size: 1.1rem; }
        
        #emptyMsg { display: none; font-size: 1.5rem; color: #64748b; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="view-counter">
        <span>Views: <span id="hit-count">...</span></span>
    </div>

    <h1 id="pageTitle">Josh Entertainment Hub</h1>
    <p class="subtitle" id="subInfo">12 Games Available | 
        <span id="viewBtn" style="color: #38bdf8; cursor: pointer; text-decoration: underline;" onclick="switchPage('favorites')">View Favorites</span> | 
        <span style="color: #38bdf8; cursor: pointer; text-decoration: underline;" onclick="switchPage('changelog')">Changelog</span>
    </p>

    <div id="mainContainer">
        <div id="gameGrid" class="game-grid">
            <!-- Game cards here -->
        </div>

        <div id="changelog">
            <h2>Site Changelog</h2>
            <ul>
                <li><strong>Current Update:</strong> Switched to JSON-based text counter for clean UI.</li>
            </ul>
            <button class="play-btn" onclick="switchPage('home')">Back to Games</button>
        </div>

        <div id="emptyMsg">No Games Favorited, Click The Star To Favorite Games</div>
    </div>

    <script>
        // Fetching raw data from Hits.sh JSON API to display as plain text
        fetch("https://hits.sh/stg420.github.io.json?url=stg420.github.io", { cache: "no-store" })
            .then(res => res.json())
            .then(data => {
                document.getElementById("hit-count").innerText = data.value;
            })
            .catch(err => {
                console.error("Counter failed:", err);
                document.getElementById("hit-count").innerText = "0";
            });

        // Functionality: Switch Pages, Favorites, etc.
        function switchPage(mode) { /* Logic omitted for brevity */ }
        function toggleFavorite(el, id) { /* Logic omitted for brevity */ }
    </script>
</body>
</html>
